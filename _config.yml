# _config.yml
# Paste this into _config.yml in your repo (replace the entire file)

# Site settings
locale                   : "en-US"
title                    : "Cognitive Brain Dynamics Lab"
title_separator          : "-"
name                     : "Dipanjan Roy"
description              : "Cognitive and Computational Neuroscience Lab at IIT Jodhpur"
url                      : "https://dynamicdip.github.io"
baseurl                  : ""
repository               : "dynamicdip/dynamicdip.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 160

# Author info
author:
  name             : "Dipanjan Roy"
  avatar           :"https://dynamicdip.github.io/images/profile.jpg"
  bio              : "Professor, Centre for Brain Science & Applications, IIT Jodhpur. Fellow of NASI. Adjunct Professor, NBRC."
  location         : "Jodhpur, Rajasthan, India"
  email            : "droy@iitj.ac.in"
  github           : "dynamicdip"
  googlescholar    : "https://scholar.google.co.in/citations?user=9Z9gTzEAAAAJ&hl=en"
  orcid            : "https://orcid.org/0000-0002-1669-1083"
  researchgate     : "https://www.researchgate.net/profile/YOUR_PROFILE"

# Reading files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README
  - node_modules
  - tmp

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Asia/Kolkata

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
