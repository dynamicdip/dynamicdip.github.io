<style>
.greedy-nav__toggle {
  display: none !important;
}
.greedy-nav .hidden-links {
  display: none !important;
}
.greedy-nav .visible-links {
  overflow: visible !important;
}

.has-dropdown {
  position: relative !important;
  display: table-cell !important;
}
.has-dropdown .dropdown-btn {
  display: inline-block !important;
  visibility: visible !important;
  opacity: 1 !important;
  color: #333 !important;
  background: none !important;
  border: none !important;
  font: inherit !important;
  cursor: pointer !important;
}
.has-dropdown .dropdown-menu.open {
  display: block !important;
}
.has-dropdown .dropdown-menu.open li {
  display: block !important;
  width: 100% !important;
}

#theme-toggle {
  display: table-cell !important;
}
#theme-toggle a,
#theme-toggle i {
  display: inline-block !important;
  visibility: visible !important;
  opacity: 1 !important;
  color: #333 !important;
  font-size: 1.2em !important;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.has-dropdown .dropdown-btn').forEach(function (btn) {
    if (!btn.textContent.trim()) {
      btn.innerHTML = 'More <span class="dropdown-caret">▾</span>';
    }
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      var menu = btn.nextElementSibling;
      if (menu && menu.classList.contains('dropdown-menu')) {
        menu.classList.toggle('open');
      }
    });
  });

  var themeLink = document.querySelector('#theme-toggle a');
  if (themeLink && !themeLink.querySelector('i')) {
    themeLink.innerHTML = '<i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true" title="toggle theme"></i>';
  }

  document.addEventListener('click', function (e) {
    if (!e.target.closest('.has-dropdown')) {
      document.querySelectorAll('.dropdown-menu.open').forEach(function (m) {
        m.classList.remove('open');
      });
    }
  });
});
</script>
